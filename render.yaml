services:
  - type: web
    name: qr-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: RAPIDAPI_ENABLED
        value: "true"
      - key: RATE_LIMIT_ENABLED
        value: "true"
